<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>trakio pairing</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #091018;
      --panel: rgba(12, 19, 30, 0.92);
      --border: rgba(255,255,255,0.08);
      --text: #eef4ff;
      --muted: #8fa4c2;
      --accent: #79e2b8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(121,226,184,0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(90,130,255,0.12), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Inter", sans-serif;
    }

    .shell {
      width: min(92vw, 760px);
      padding: 28px;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      display: grid;
      gap: 22px;
      justify-items: center;
      text-align: center;
    }

    .eyebrow {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 12px;
      color: var(--accent);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.08;
    }

    .sub {
      margin: 0;
      max-width: 52ch;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }

    .qr {
      width: min(56vw, 320px);
      aspect-ratio: 1;
      border-radius: 24px;
      background: white;
      padding: 18px;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .qr img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .qr.missing {
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      border: 1px dashed var(--border);
      padding: 24px;
    }

    .mac {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      letter-spacing: 0.14em;
      word-break: break-word;
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="shell">
    <p class="eyebrow">trakio bluetooth handoff</p>
    <h1>Scan This Pi</h1>
    <p class="sub">Use the Tauri app to scan this QR or enter the MAC manually. The app will connect directly to RFCOMM channel 1 and push the Wi-Fi payload.</p>
    <div class="qr" id="qr-slot"></div>
    <div class="mac" id="mac-text">--:--:--:--:--:--</div>
    <p class="hint">If the QR is missing, install <strong>qrencode</strong> on the Pi and rerun the pairing launcher.</p>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const mac = params.get('mac') || '--:--:--:--:--:--';
    const qr = params.get('qr');
    document.getElementById('mac-text').textContent = mac;

    const slot = document.getElementById('qr-slot');
    if (qr) {
      const img = document.createElement('img');
      img.src = decodeURIComponent(qr);
      img.alt = `Bluetooth MAC QR for ${mac}`;
      slot.appendChild(img);
    } else {
      slot.classList.add('missing');
      slot.textContent = 'QR image unavailable';
    }
  </script>
</body>
</html>
