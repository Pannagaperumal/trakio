<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>trakio</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0a0e1a;
      --bg-alt: #0f1419;
      --road:   #1b2236;
      --accent: #a78bfa;
      --accent-light: #c4b5fd;
      --text:   #e6edf3;
      --text-secondary: #8b949e;
      --muted:  #6e7a96;
      --green:  #3fb950;
      --red:    #f85149;
      --fr:     #13192b; /* faint road colour */
    }
    html, body {
      width: 100vw; height: 100vh;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      user-select: none; -webkit-user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* ── Rectangular display ─────────────────────── */
    #display {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg-alt) 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Screens ────────────────────────────────── */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
    }
    .screen.active { opacity: 1; pointer-events: auto; }

    /* ── Connection dot + mode badge ────────────── */
    #conn-dot {
      position: absolute; top: 3.2vmin; left: 3.2vmin;
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--muted); z-index: 9999;
      transition: background .3s, box-shadow .3s;
    }
    #conn-dot.live  { background: var(--green); box-shadow: 0 0 8px var(--green); }
    #conn-dot.error { background: var(--red); }

    /* tiny mode badge top-right */
    #mode-badge {
      position: absolute; top: 3vmin; right: 3.2vmin;
      font-size: 2vmin; font-weight: 700; z-index: 9999;
      color: var(--muted); letter-spacing: .5px;
      opacity: 0; transition: opacity .3s;
    }
    #mode-badge.visible { opacity: 1; }

    /* Minimal incoming call toast */
    #call-toast {
      position: absolute;
      top: 4.4vmin;
      left: 50%;
      transform: translateX(-50%) translateY(-1.6vmin);
      min-width: 36vmin;
      max-width: 72vmin;
      padding: 2vmin 2.8vmin;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 2.6vmin;
      background: rgba(11,13,18,0.84);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      gap: 1.8vmin;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
      z-index: 10001;
    }
    #call-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .call-toast-icon {
      width: 5.2vmin;
      height: 5.2vmin;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(63,185,80,0.18);
      color: var(--green);
    }
    .call-toast-icon svg { width: 2.7vmin; height: 2.7vmin; }
    .call-toast-copy { min-width: 0; }
    .call-toast-label {
      font-size: 1.95vmin;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.1vmin;
      text-transform: uppercase;
    }
    .call-toast-name {
      font-size: 3vmin;
      color: var(--text);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ══════════════════════════════════════════════
       CLOCK / HOME SCREEN (ENHANCED)
    ══════════════════════════════════════════════ */
    #clock-screen {
      gap: 2.5vh;
      background:
        radial-gradient(ellipse 120% 150% at 50% -10%, rgba(167,139,250,0.15), transparent 50%),
        radial-gradient(ellipse 150% 80% at 100% 100%, rgba(63,185,144,0.08), transparent 60%),
        var(--bg);
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Animated background orbs */
    #clock-screen::before {
      content: '';
      position: absolute;
      width: 45vmin;
      height: 45vmin;
      background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%);
      border-radius: 50%;
      top: -15vmin;
      left: -15vmin;
      pointer-events: none;
      opacity: 0.75;
    }

    #clock-screen::after {
      content: '';
      position: absolute;
      width: 50vmin;
      height: 50vmin;
      background: radial-gradient(circle, rgba(63,185,144,0.06) 0%, transparent 70%);
      border-radius: 50%;
      bottom: -20vmin;
      right: -20vmin;
      pointer-events: none;
      opacity: 0.7;
    }

    .clock-brand {
      position: relative;
      z-index: 2;
      font-size: 3vmin;
      font-weight: 900;
      letter-spacing: -0.1vmin;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
      margin-bottom: 1vh;
      opacity: 0.95;
    }

    .clock-time {
      font-size: 22vmin;
      font-weight: 950;
      letter-spacing: -1vmin;
      color: var(--text);
      line-height: 0.95;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 12px rgba(0,0,0,0.35);
      display: flex;
      align-items: baseline;
      position: relative;
      z-index: 2;
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
    }

    .clock-colon {
      color: var(--accent);
      animation: colonblink 2s steps(1, end) infinite;
      margin: 0 -0.8vmin;
    }

    @keyframes colonblink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.15; }
    }

    .clock-ampm {
      font-size: 5vmin;
      font-weight: 700;
      color: var(--text-secondary);
      margin-left: 2vmin;
      letter-spacing: 0.1vmin;
      font-size: 4vmin;
    }

    .clock-date {
      font-size: 2.8vmin;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.15vmin;
      margin-top: 1.5vh;
      position: relative;
      z-index: 2;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .clock-foot {
      position: absolute;
      bottom: 5vh;
      font-size: 2vmin;
      color: var(--text-secondary);
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 1.2vmin;
      z-index: 2;
      letter-spacing: 0.05vmin;
    }

    .clock-foot .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-secondary);
      opacity: 0.6;
      transition: all 0.3s ease;
    }

    .clock-foot.ready .dot {
      background: var(--green);
      box-shadow: 0 0 5px rgba(63,185,144,0.7);
      opacity: 1;
    }

    .clock-foot.error .dot {
      background: var(--red);
      box-shadow: 0 0 4px rgba(248,81,73,0.6);
    }

    /* Accent bar under clock */
    .clock-accent-bar {
      position: absolute;
      bottom: 9vh;
      width: 8vmin;
      height: 0.3vmin;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
      z-index: 2;
    }

    /* ══════════════════════════════════════════════
       NAV SCREEN  — two layers, only one visible
    ══════════════════════════════════════════════ */
    #nav-screen { padding: 0; }

    /* ── Map layer (Leaflet primary) ─────────────── */
    #map-layer {
      position: absolute; inset: 0;
      opacity: 0; transition: opacity .4s;
    }
    #map-layer.active { opacity: 1; }

    #leaflet-map {
      position: absolute; inset: 0;
      width: 100%; height: 100%; z-index: 1;
    }
    #leaflet-map .leaflet-tile-pane  { filter: brightness(0.8) saturate(0.65); }
    #leaflet-map .leaflet-control-attribution,
    #leaflet-map .leaflet-control-zoom { display: none !important; }

    /* HUD gradient at bottom of map */
    #map-hud {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 500;
      padding: 26% 14% 9%;
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(11,13,18,0.82) 40%,
        rgba(11,13,18,0.97) 100%);
      pointer-events: none;
    }
    .hud-row { display: flex; align-items: center; gap: 3vmin; }
    .hud-arrow-wrap { width: 11vmin; height: 11vmin; flex-shrink: 0; color: var(--accent); }
    .hud-arrow-wrap svg { width: 100%; height: 100%; }
    #map-dist  { font-size: 11.2vmin; font-weight: 900; color: var(--accent); letter-spacing: -.35vmin; line-height: .95;
           text-shadow: 0 2px 10px rgba(0,0,0,0.28); }
    #map-label { font-size: 3.7vmin; color: var(--text); margin-top: 1.6vmin; font-weight: 600; line-height: 1.12;
           max-width: min(72vw, 70ch); text-wrap: balance; }

    /* ── SVG layer (fallback) ────────────────────── */
    #svg-layer {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 10% 12%;
      opacity: 0; transition: opacity .4s;
    }
    #svg-layer.active { opacity: 1; }

    #road-svg   { width: 62vmin; height: 62vmin; flex-shrink: 0; }
    #svg-dist   { font-size: 12.2vmin; font-weight: 900; color: var(--accent); letter-spacing: -.35vmin; line-height: .95; margin-top: 3vmin;
            text-shadow: 0 2px 10px rgba(0,0,0,0.28); }
    #svg-label  { font-size: 4vmin; color: var(--text); margin-top: 1.8vmin; font-weight: 600; line-height: 1.14;
            text-align: center; max-width: 74%; text-wrap: balance; }

    /* Position marker (shared) */
    .pos-outer {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      transform-origin: 50% 50%;
    }
    .pos-cat {
      width: 100%; height: 100%;
      display: block;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.35));
    }
    .pos-cat-badge { fill: rgba(167,139,250,0.18); stroke: rgba(255,255,255,0.24); stroke-width: 1.5; }
    .pos-cat-face { fill: var(--accent); }
    .pos-cat-detail { fill: #ffffff; }
    .pos-cat-nose { fill: #0b0d12; opacity: 0.92; }

    /* ══════════════════════════════════════════════
       ARRIVED
    ══════════════════════════════════════════════ */
    #arrived-screen { gap: 5vmin; }
    .arrived-icon  { width: 22vmin; height: 22vmin; color: var(--green); filter: drop-shadow(0 0 3vmin var(--green)); }
    .arrived-title { font-size: 8vmin; font-weight: 800; color: var(--green); }
    .arrived-dest  { font-size: 3.5vmin; color: var(--muted); text-align: center; max-width: 65%; }

    /* ══════════════════════════════════════════════
       SETTINGS OVERLAY
    ══════════════════════════════════════════════ */
    #settings {
      position: absolute; inset: 0; z-index: 10000;
      background: rgba(11,13,18,0.94);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4vmin;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    #settings.open { opacity: 1; pointer-events: auto; }
    .set-label  { font-size: 3.5vmin; color: var(--muted); font-weight: 600; }
    .set-input  {
      background: #1b2236; border: 1px solid #30363d;
      color: var(--text); border-radius: 2vmin; padding: 2vmin 3vmin;
      font-size: 3.2vmin; width: 68%; text-align: center; outline: none;
    }
    .set-btn    { background: var(--accent); color: #fff; border: none; border-radius: 2vmin; padding: 2vmin 5vmin; font-size: 3.5vmin; font-weight: 700; cursor: pointer; }
    .set-cancel { background: none; border: none; color: var(--muted); font-size: 3vmin; cursor: pointer; }
  </style>
</head>
<body>
<div id="display">

  <div id="conn-dot"></div>
  <div id="mode-badge"></div>
  <div id="call-toast" aria-live="polite" aria-atomic="true">
    <div class="call-toast-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.86 19.86 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.86 19.86 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.78.64 2.62a2 2 0 0 1-.45 2.11L8.03 9.73a16 16 0 0 0 6.24 6.24l1.28-1.27a2 2 0 0 1 2.11-.45c.84.31 1.72.52 2.62.64A2 2 0 0 1 22 16.92z"></path>
      </svg>
    </div>
    <div class="call-toast-copy">
      <div class="call-toast-label">Incoming call</div>
      <div class="call-toast-name" id="call-toast-name">Unknown caller</div>
    </div>
  </div>

  <!-- ── CLOCK / HOME ────────────────────────────── -->
  <div id="clock-screen" class="screen active">
    <div class="clock-brand">trakio</div>
    <div class="clock-time">
      <span id="clk-h">--</span><span class="clock-colon">:</span><span id="clk-m">--</span><span class="clock-ampm" id="clk-ampm"></span>
    </div>
    <div class="clock-date" id="clk-date">—</div>
    <div class="clock-foot" id="clk-foot">
      <span class="dot"></span><span id="clk-status">Waiting for app…</span>
    </div>
  </div>

  <!-- ── NAV ─────────────────────────────────────── -->
  <div id="nav-screen" class="screen">

    <!-- Layer A: Leaflet real map -->
    <div id="map-layer">
      <div id="leaflet-map"></div>
      <div id="map-hud">
        <div class="hud-row">
          <div class="hud-arrow-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path id="map-arrow-path" d="M12 19V5M5 12l7-7 7 7"/>
            </svg>
          </div>
          <div id="map-dist">—</div>
        </div>
        <div id="map-label">—</div>
      </div>
    </div>

    <!-- Layer B: SVG turn diagram (fallback) -->
    <div id="svg-layer">
      <svg id="road-svg" viewBox="0 0 100 100" fill="none"></svg>
      <div id="svg-dist">—</div>
      <div id="svg-label">—</div>
    </div>

  </div>

  <!-- ── ARRIVED ──────────────────────────────────── -->
  <div id="arrived-screen" class="screen">
    <div class="arrived-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>
    <div class="arrived-title">Arrived</div>
    <div class="arrived-dest" id="arrived-dest">—</div>
  </div>

  <!-- ── SETTINGS ─────────────────────────────────── -->
  <div id="settings">
    <div class="set-label">WebSocket Host</div>
    <input class="set-input" id="settings-input" type="text"
           placeholder="ws://localhost:9001" spellcheck="false" autocomplete="off">
    <button class="set-btn"    id="settings-connect">Connect</button>
    <button class="set-cancel" id="settings-cancel">Cancel</button>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Arrow SVG paths ────────────────────────────────
const ARROWS = {
  'depart':            'M12 19V5M5 12l7-7 7 7',
  'arrive':            'M12 5v14M5 12l7 7 7-7',
  'turn-right':        'M5 12h14M13 5l7 7-7 7',
  'turn-left':         'M19 12H5M11 5l-7 7 7 7',
  'turn-slight-right': 'M5 12h11M13 7l4 5-4 5',
  'turn-slight-left':  'M19 12H8M11 7l-4 5 4 5',
  'turn-sharp-right':  'M5 12h8l4-7M9 5l8 7-8 7',
  'turn-sharp-left':   'M19 12h-8l-4-7M15 5l-8 7 8 7',
  'continue':          'M12 19V5M5 12l7-7 7 7',
  'roundabout':        'M12 2a10 10 0 1 0 0 20M15 8l-3-3-3 3',
  'uturn':             'M4 12h12a4 4 0 0 0 0-8H8',
};

// ── SVG road diagrams (with faint other roads) ─────
const FR = '#13192b';
const DIAG = {
  straight: `
    <rect x="0"  y="40" width="38" height="20" fill="${FR}"/>
    <rect x="62" y="40" width="38" height="20" fill="${FR}"/>
    <rect x="40" y="5" width="20" height="90" rx="10" fill="#1b2236"/>
    <line x1="50" y1="12" x2="50" y2="88" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="7 5"/>
    <path d="M50 86 L50 18" stroke="#a78bfa" stroke-width="7" stroke-linecap="round"/>
    <polygon points="50,8 41,24 59,24" fill="white"/>`,
  'turn-right': `
    <rect x="40" y="0"  width="20" height="38" fill="${FR}"/>

    <path d="M40,100 L40,50 Q40,38 52,38 L100,38 L100,58 L60,58 L60,100 Z" fill="#1b2236"/>
    <line x1="50" y1="62" x2="50" y2="100" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="7 5"/>
    <line x1="62" y1="48" x2="100" y2="48" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="7 5"/>
    <path d="M50,88 L50,52 Q50,44 58,44 L84,44" stroke="#a78bfa" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="93,44 80,37 80,51" fill="white"/>`,
  'turn-left': `
    <rect x="40" y="0"  width="20" height="38" fill="${FR}"/>
    <rect x="60" y="38" width="40" height="20" fill="${FR}"/>
    <path d="M60,100 L60,50 Q60,38 48,38 L0,38 L0,58 L40,58 L40,100 Z" fill="#1b2236"/>
    <line x1="50" y1="62" x2="50" y2="100" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="7 5"/>
    <line x1="38" y1="48" x2="0" y2="48" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="7 5"/>
    <path d="M50,88 L50,52 Q50,44 42,44 L16,44" stroke="#a78bfa" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="7,44 20,37 20,51" fill="white"/>`,
  'turn-slight-right': `
    <rect x="40" y="0" width="20" height="65" fill="${FR}"/>
    <path d="M40,100 C43,60 55,28 65,5 L78,9 C68,32 55,63 54,100 Z" fill="#1b2236"/>
    <path d="M47,98 C50,58 62,28 72,7" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="7 5" fill="none"/>
    <path d="M50,88 C53,55 63,26 71,8" stroke="#a78bfa" stroke-width="7" fill="none" stroke-linecap="round"/>
    <g transform="translate(71,8) rotate(22)"><polygon points="0,-10 -8,5 8,5" fill="white"/></g>`,
  'turn-slight-left': `
    <rect x="40" y="0" width="20" height="65" fill="${FR}"/>
    <path d="M60,100 C57,60 45,28 35,5 L22,9 C32,32 45,63 46,100 Z" fill="#1b2236"/>
    <path d="M53,98 C50,58 38,28 28,7" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="7 5" fill="none"/>
    <path d="M50,88 C47,55 37,26 29,8" stroke="#a78bfa" stroke-width="7" fill="none" stroke-linecap="round"/>
    <g transform="translate(29,8) rotate(-22)"><polygon points="0,-10 -8,5 8,5" fill="white"/></g>`,
  'turn-sharp-right': `
    <rect x="40" y="0"  width="20" height="50" fill="${FR}"/>
    <rect x="0"  y="50" width="40" height="18" fill="${FR}"/>
    <path d="M40,100 L40,60 Q40,50 50,50 L100,50 L100,68 L60,68 L60,100 Z" fill="#1b2236"/>
    <line x1="50" y1="72" x2="50" y2="100" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="7 5"/>
    <line x1="64" y1="59" x2="100" y2="59" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="7 5"/>
    <path d="M50,90 L50,60 Q50,55 56,55 L84,55" stroke="#a78bfa" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="93,55 80,48 80,62" fill="white"/>`,
  'turn-sharp-left': `
    <rect x="40" y="0"  width="20" height="50" fill="${FR}"/>
    <rect x="60" y="50" width="40" height="18" fill="${FR}"/>
    <path d="M60,100 L60,60 Q60,50 50,50 L0,50 L0,68 L40,68 L40,100 Z" fill="#1b2236"/>
    <line x1="50" y1="72" x2="50" y2="100" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="7 5"/>

    <polygon points="7,55 20,48 20,62" fill="white"/>`,
  roundabout: `
    <rect x="40" y="0"  width="20" height="18" fill="${FR}"/>
    <rect x="0"  y="35" width="26" height="14" fill="${FR}"/>
    <rect x="40" y="58" width="20" height="42" fill="#1b2236"/>
    <circle cx="50" cy="42" r="24" stroke="#1b2236" stroke-width="14" fill="none"/>
    <circle cx="50" cy="42" r="10" fill="#0b0d12"/>
    <rect x="62" y="35" width="38" height="14" fill="#1b2236"/>
    <path d="M50,80 L50,64" stroke="#a78bfa" stroke-width="7" stroke-linecap="round"/>
    <path d="M50,64 A24,24 0 0,1 74,42" stroke="#a78bfa" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M74,42 L90,42" stroke="#a78bfa" stroke-width="7" stroke-linecap="round"/>
    <polygon points="98,42 85,35 85,49" fill="white"/>`,
  uturn: `
    <rect x="33" y="44" width="14" height="56" fill="#1b2236"/>
    <rect x="53" y="44" width="14" height="56" fill="#1b2236"/>
    <path d="M33,44 Q33,8 50,8 Q67,8 67,44" stroke="#1b2236" stroke-width="14" fill="none"/>
    <rect x="46" y="50" width="8" height="50" fill="${FR}"/>
    <path d="M33,44 Q33,8 50,8 Q67,8 67,44" stroke="#0b0d12" stroke-width="3" fill="none"/>
    <path d="M60,95 L60,46 Q60,18 50,18 Q40,18 40,46 L40,95" stroke="#a78bfa" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="40,100 33,86 47,86" fill="white"/>`,
  arrive: `
    <rect x="0"  y="38" width="38" height="20" fill="${FR}"/>
    <rect x="62" y="38" width="38" height="20" fill="${FR}"/>
    <rect x="40" y="48" width="20" height="52" fill="#1b2236"/>
    <line x1="50" y1="54" x2="50" y2="92" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="7 5"/>
    <path d="M50,88 L50,50" stroke="#a78bfa" stroke-width="7" stroke-linecap="round"/>
    <circle cx="50" cy="28" r="18" fill="#1b2236" stroke="#a78bfa" stroke-width="2.5"/>
    <circle cx="50" cy="28" r="7"  fill="#a78bfa"/>
    <circle cx="50" cy="28" r="3"  fill="#0b0d12"/>`,
};

// ── Config ─────────────────────────────────────────
const DEFAULT_WS      = 'ws://localhost:9001';
const RECONNECT_MS    = 3000;
const TILE_TIMEOUT_MS = 1500; // fall back to SVG if tiles don't load
const NAV_ZOOM        = 17.5;
const ARRIVAL_HOME_MS = 4000;
const CALL_TOAST_MS   = 2400;
const CALL_DEDUPE_MS  = 8000;

// ── State ──────────────────────────────────────────
let ws          = null;
let reconnTimer = null;
let wsUrl       = '';
let routeSteps  = [];
let destName    = '';
let navigating  = false;
let posMarker   = null;
let routeLayer  = null;
let casingLayer = null;
let posHeading  = 0;
let arrivalTimer = null;
let callToastTimer = null;
let lastCallSignature = '';
let lastCallShownAt = 0;

// Rendering mode: 'map' = Leaflet (preferred), 'svg' = fallback
let renderMode      = 'map';
let tilesEverLoaded = false;
let tileTimer       = null;

// Smooth camera follow state (rAF lerp — no Leaflet animation queuing)
let camTarget = null;  // {lat, lng} latest GPS fix
let camCur    = null;  // current interpolated camera centre
let rafHandle = null;
const CAM_ALPHA = 0.12; // lerp factor per frame (~60 fps → reaches target in ~0.5 s)
const CAM_STOP  = 1e-6; // stop lerping when this close (degrees)
const CAM_FRAME_MS = 48;
let lastCamPaint = 0;

function lerpCam(ts = 0) {
  if (!camTarget || !camCur) {
    rafHandle = null;
    return;
  }
  const dLat = camTarget.lat - camCur.lat;
  const dLng = camTarget.lng - camCur.lng;
  if (Math.abs(dLat) < CAM_STOP && Math.abs(dLng) < CAM_STOP) {
    camCur = { ...camTarget };
    if (ts - lastCamPaint >= CAM_FRAME_MS) {
      leafMap.setView([camCur.lat, camCur.lng], NAV_ZOOM, { animate: false });
      lastCamPaint = ts;
    }
    rafHandle = null;
    return; // done — don't schedule next frame
  }
  camCur.lat += dLat * CAM_ALPHA;
  camCur.lng += dLng * CAM_ALPHA;
  if (ts - lastCamPaint >= CAM_FRAME_MS) {
    leafMap.setView([camCur.lat, camCur.lng], NAV_ZOOM, { animate: false });
    lastCamPaint = ts;
  }
  rafHandle = requestAnimationFrame(lerpCam);
}

function setCamTarget(lat, lng) {
  camTarget = { lat, lng };
  if (!camCur) camCur = { lat, lng };
  if (!rafHandle) {
    rafHandle = requestAnimationFrame(lerpCam);
  }
}

// ── Leaflet map ────────────────────────────────────
const leafMap = L.map('leaflet-map', {
  zoomControl: false, attributionControl: false,
  center: [12.9716, 77.5946], zoom: 5,
  // Disable ALL built-in animations — they queue up and jitter on Pi
  zoomAnimation: false,
  fadeAnimation: false,
  markerZoomAnimation: false,
  inertia: false,
});
const tileLayer = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  {
    maxZoom: 20, subdomains: 'abcd',
    keepBuffer: 4,          // pre-load extra tiles around viewport
    updateWhenIdle: false,  // load tiles immediately, not just after pan stops
    updateWhenZooming: false, // don't reload mid-zoom
  }
).addTo(leafMap);

// Detect tile success / failure
tileLayer.on('tileload', () => {
  if (!tilesEverLoaded) {
    tilesEverLoaded = true;
    clearTimeout(tileTimer);
    // If we were in SVG mode due to timeout, switch back now
    if (navigating && renderMode !== 'map') applyMode('map', false);
  }
});
tileLayer.on('tileerror', () => {
  if (!tilesEverLoaded) schedulesvgFallback();
});

function schedulesvgFallback() {
  clearTimeout(tileTimer);
  tileTimer = setTimeout(() => {
    if (!tilesEverLoaded && navigating) applyMode('svg', true);
  }, TILE_TIMEOUT_MS);
}

// ── Mode switching ─────────────────────────────────
function applyMode(mode, forced) {
  renderMode = mode;
  document.getElementById('map-layer').classList.toggle('active', mode === 'map');
  document.getElementById('svg-layer').classList.toggle('active', mode === 'svg');
  const badge = document.getElementById('mode-badge');
  if (forced && mode === 'svg') {
    badge.textContent = 'SVG fallback';
    badge.classList.add('visible');
    setTimeout(() => badge.classList.remove('visible'), 3000);
  } else {
    badge.classList.remove('visible');
  }
  if (mode === 'map') setTimeout(() => leafMap.invalidateSize(), 60);
}

// ── Position marker ────────────────────────────────
// Created once; heading updated by mutating the existing DOM element
// (avoids the expensive setIcon → removeLayer/addLayer cycle on every GPS fix)
function createPosMarker(lat, lng, hdg) {
  const icon = L.divIcon({
    className: '',
    iconSize: [38, 38], iconAnchor: [19, 19],
    html: `<div class="pos-outer">
             <svg class="pos-cat" viewBox="0 0 38 38" aria-hidden="true">
               <circle class="pos-cat-badge" cx="19" cy="19" r="17"></circle>
               <path class="pos-cat-face" d="M19 6l4.1 4.4 5.4-1.2-1.6 5.1c2.4 2.4 3.6 5.1 3.6 7.9 0 6.3-5.2 10.8-11.5 10.8S7.5 28.5 7.5 22.2c0-2.8 1.2-5.5 3.6-7.9L9.5 9.2l5.4 1.2L19 6z"></path>
               <circle class="pos-cat-detail" cx="14.5" cy="21" r="1.6"></circle>
               <circle class="pos-cat-detail" cx="23.5" cy="21" r="1.6"></circle>
               <path class="pos-cat-nose" d="M19 23.4l2.1 2.1h-4.2L19 23.4z"></path>
               <path class="pos-cat-detail" d="M14.1 27.2c1.1 1.1 2.8 1.7 4.9 1.7s3.8-.6 4.9-1.7l-1.2-1.1c-.8.8-2.1 1.2-3.7 1.2s-2.9-.4-3.7-1.2l-1.2 1.1z"></path>
             </svg>
           </div>`,
  });
  posMarker = L.marker([lat, lng], { icon, zIndexOffset: 1000 }).addTo(leafMap);
  posHeading = hdg ?? 0;
  const outer = posMarker.getElement()?.querySelector('.pos-outer');
  if (outer) outer.style.transform = `rotate(${posHeading}deg)`;
}

function updatePosMarker(lat, lng, hdg) {
  if (!posMarker) {
    createPosMarker(lat, lng, hdg);
  } else {
    // Move marker position (cheap — just updates CSS translate)
    posMarker.setLatLng([lat, lng]);
    // Rotate existing DOM element directly — no DOM rebuild
    if (hdg != null && hdg !== posHeading) {
      posHeading = hdg;
      const outer = posMarker.getElement()?.querySelector('.pos-outer');
      if (outer) outer.style.transform = `rotate(${hdg}deg)`;
    }
  }
}

// ── Route drawing ──────────────────────────────────
// Uses full routeCoords polyline (road-following) when available,
// falls back to step waypoints.
function drawRoute(routeCoords, steps, origin, dest) {
  [routeLayer, casingLayer].forEach(l => { if (l) { leafMap.removeLayer(l); } });
  routeLayer = casingLayer = null;
  // Remove any old dest markers
  leafMap.eachLayer(l => { if (l._isTrakioDest) leafMap.removeLayer(l); });

  let pts = [];
  if (routeCoords && routeCoords.length > 1) {
    // Full road-following polyline from Ola Maps decoder
    pts = routeCoords;
  } else {
    // Fallback: step waypoints (straight lines between turns)
    if (origin) pts.push([origin.lat, origin.lng]);
    for (const s of steps) {
      if (s.end_location) pts.push([s.end_location.lat, s.end_location.lng]);
    }
    if (dest) pts.push([dest.lat, dest.lng]);
  }

  if (pts.length < 2) return;

  casingLayer = L.polyline(pts, {
    color: 'rgba(255,255,255,0.12)', weight: 11,
    lineCap: 'round', lineJoin: 'round', interactive: false,
  }).addTo(leafMap);

  routeLayer = L.polyline(pts, {
    color: '#a78bfa', weight: 5, opacity: 0.95,
    lineCap: 'round', lineJoin: 'round', interactive: false,
  }).addTo(leafMap);

  // Destination marker
  if (dest) {
    const m = L.circleMarker([dest.lat, dest.lng], {
      radius: 7, color: '#f85149', fillColor: '#f85149',
      fillOpacity: 1, weight: 2,
    }).addTo(leafMap);
    m._isTrakioDest = true;
    if (destName) m.bindTooltip(destName, { permanent: true, direction: 'top', offset: [0, -10] });
  }

  leafMap.fitBounds(routeLayer.getBounds(), { padding: [44, 44] });
}

// ── Helpers ────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function setArrow(maneuver) {
  const d = ARROWS[maneuver] || ARROWS['continue'];
  document.getElementById('map-arrow-path').setAttribute('d', d);
}
function setDiagram(maneuver) {
  document.getElementById('road-svg').innerHTML = DIAG[maneuver] || DIAG.straight;
}
function setConnDot(state) {
  document.getElementById('conn-dot').className =
    state === 'live' ? 'live' : state === 'error' ? 'error' : '';
}
function setClockStatus(text, state = '') {
  const foot = document.getElementById('clk-foot');
  foot.classList.remove('ready', 'error');
  if (state) foot.classList.add(state);
  document.getElementById('clk-status').textContent = text;
}
function fmt(m) {
  if (m == null) return '—';
  return m >= 1000 ? `${(m / 1000).toFixed(1)} km` : `${Math.round(m)} m`;
}

function clearArrivalTimer() {
  clearTimeout(arrivalTimer);
  arrivalTimer = null;
}

function showCallToast(callerName) {
  const toast = document.getElementById('call-toast');
  document.getElementById('call-toast-name').textContent = callerName || 'Unknown caller';
  clearTimeout(callToastTimer);
  toast.classList.add('visible');
  callToastTimer = setTimeout(() => {
    toast.classList.remove('visible');
  }, CALL_TOAST_MS);
}

function shouldShowIncomingCall(msg) {
  const signature = String(msg.call_id || msg.id || msg.caller || msg.name || 'unknown');
  const now = Date.now();
  if (signature === lastCallSignature && now - lastCallShownAt < CALL_DEDUPE_MS) {
    return false;
  }
  lastCallSignature = signature;
  lastCallShownAt = now;
  return true;
}

function returnToHome() {
  navigating = false;
  clearArrivalTimer();
  show('clock-screen');
}

// ── WS message handler ─────────────────────────────
function handleMsg(msg) {
  if (msg.type === 'incoming_call') {
    if (shouldShowIncomingCall(msg)) {
      showCallToast(msg.caller || msg.name);
    }
    return;
  }

  // App may override render mode at any time
  if (msg.display_mode && msg.display_mode !== renderMode) {
    tilesEverLoaded = false; // reset so timeout can trigger again
    applyMode(msg.display_mode, false);
    if (msg.display_mode === 'map') schedulesvgFallback();
  }

  if (msg.type === 'route_start') {
    clearArrivalTimer();
    routeSteps = msg.steps || [];
    destName   = msg.destination?.name || '';
    navigating = true;

    // Draw road-following route (or step waypoints as fallback)
    drawRoute(msg.routeCoords, routeSteps, msg.origin, msg.destination);

    if (msg.origin) {
      updatePosMarker(msg.origin.lat, msg.origin.lng, 0);
      setCamTarget(msg.origin.lat, msg.origin.lng);
    }

    const first = routeSteps[0];
    const maneuver = first?.maneuver || 'depart';
    const dist     = fmt(first?.distance);
    const label    = first?.instructions || 'Head out';

    setArrow(maneuver);
    setDiagram(maneuver);
    document.getElementById('map-dist').textContent  = dist;
    document.getElementById('map-label').textContent = label;
    document.getElementById('svg-dist').textContent  = dist;
    document.getElementById('svg-label').textContent = label;
    document.getElementById('arrived-dest').textContent = destName;

    // Activate nav screen and start tile timeout
    show('nav-screen');
    const wantedMode = msg.display_mode || 'map';
    applyMode(wantedMode, false);
    if (wantedMode === 'map') schedulesvgFallback();
  }

  if (msg.type === 'position') {
    if (!navigating) return;
    if (msg.arrived) {
      show('arrived-screen');
      clearArrivalTimer();
      arrivalTimer = setTimeout(returnToHome, ARRIVAL_HOME_MS);
      return;
    }

    const { lat, lng, heading, step_idx, step, dist_next } = msg;
    const idx  = step_idx ?? 0;
    const sObj = routeSteps[idx];
    const maneuver = sObj?.maneuver || 'continue';

    // Update marker (cheap DOM mutation) + smooth camera lerp
    updatePosMarker(lat, lng, heading ?? 0);
    setCamTarget(lat, lng);

    // Update both layers' HUD data
    setArrow(maneuver);
    setDiagram(maneuver);
    document.getElementById('map-dist').textContent  = dist_next || '—';
    document.getElementById('map-label').textContent = step || '—';
    document.getElementById('svg-dist').textContent  = dist_next || '—';
    document.getElementById('svg-label').textContent = step || '—';
  }
}

// ── WebSocket ──────────────────────────────────────
function connect(url) {
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  clearTimeout(reconnTimer);

  wsUrl = url || wsUrl;

  if (!wsUrl) {
    setConnDot('');
    setClockStatus('Set WebSocket host to start', '');
    return;
  }

  document.getElementById('settings-input').value  = wsUrl;
  setConnDot('');
  setClockStatus('Connecting…', '');

  ws = new WebSocket(wsUrl);
  ws.onopen    = () => {
    setConnDot('live');
    setClockStatus('Connected', 'ready');
  };
  ws.onmessage = e => { try { handleMsg(JSON.parse(e.data)); } catch {} };
  ws.onerror   = () => ws.close();
  ws.onclose   = () => {
    setConnDot('error');
    setClockStatus(`Disconnected from ${wsUrl}`, 'error');
    reconnTimer = setTimeout(() => connect(wsUrl), RECONNECT_MS);
  };
}

function getStartupWsUrl() {
  return new URLSearchParams(location.search).get('ws')
    || DEFAULT_WS;
}

// ── Settings (long-press 1.5 s) ────────────────────
const settingsEl = document.getElementById('settings');
let pressTimer;
document.getElementById('display').addEventListener('pointerdown', () => {
  if (settingsEl.classList.contains('open')) return;
  pressTimer = setTimeout(() => settingsEl.classList.add('open'), 1500);
});
document.addEventListener('pointerup',   () => clearTimeout(pressTimer));
document.addEventListener('pointermove', () => clearTimeout(pressTimer));
document.getElementById('settings-connect').addEventListener('click', () => {
  const v = document.getElementById('settings-input').value.trim();
  if (v) { connect(v); settingsEl.classList.remove('open'); }
});
document.getElementById('settings-cancel').addEventListener('click', () => {
  settingsEl.classList.remove('open');
});

wsUrl = getStartupWsUrl();
document.getElementById('settings-input').value = wsUrl;
connect(wsUrl);

// ── Clock update ───────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
  
  const dateFormatter = new Intl.DateTimeFormat('en-US', {
    weekday: 'short',
    month: 'short',
    day: 'numeric'
  });
  const dateStr = dateFormatter.format(now);

  document.getElementById('clk-h').textContent = h;
  document.getElementById('clk-m').textContent = m;
  document.getElementById('clk-ampm').textContent = ampm;
  document.getElementById('clk-date').textContent = dateStr;
}

updateClock();
setInterval(updateClock, 1000);
</script>
